name: Build and Push to ECR

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
    
    - name: Build Docker image (Data MCP)
      run: |
        docker build -t ${{ env.ECR_REGISTRY }}/fmcg-data-mcp:${{ env.IMAGE_TAG }} mcp-servers/data/
    
    - name: Push to ECR
      run: |
        docker push ${{ env.ECR_REGISTRY }}/fmcg-data-mcp:${{ env.IMAGE_TAG }}
    
    - name: Print image URI
      run: |
        echo "Image pushed: ${{ env.ECR_REGISTRY }}/fmcg-data-mcp:${{ env.IMAGE_TAG }}"
